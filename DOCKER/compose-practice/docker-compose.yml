services:
  flask_api:
      networks:
        - flasknet
      build: .
      ports: 
        - "8000:5000"
      environment: 
        - FLASK_ENV=production
        - DB_HOST=database
        - DB_PORT=5432
      restart: unless-stopped
      depends_on:
        database:
          condition: service_healthy
  database:
      networks:
        - flasknet
      image: postgres:15-alpine 
      volumes:
                  - dbdata:/var/lib/postgresql/data
      environment:
                  - POSTGRES_DB=flaskdb
                  - POSTGRES_USER=flaskuser
                  - POSTGRES_PASSWORD=flaskpass
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U flaskuser -d flaskdb"]
        interval: 10s
        timeout: 5s
        retries: 5
networks: 
  flasknet:
volumes:
  dbdata:

